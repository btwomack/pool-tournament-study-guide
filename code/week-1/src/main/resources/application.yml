spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/pool_tournament}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate # Flyway manages schema
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret: ${JWT_SECRET:placeholder_secret_key_at_least_32_characters_long_for_security}
    expiration-ms: 86400000 # 24 hours
  cors:
    allowed-origins: ${APP_URL:http://localhost:3000}

stripe:
  secret-key: ${STRIPE_SECRET_KEY:sk_test_placeholder}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_placeholder}

twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:AC_placeholder}
  auth-token: ${TWILIO_AUTH_TOKEN:token_placeholder}
  phone-number: ${TWILIO_PHONE_NUMBER:+1234567890}
