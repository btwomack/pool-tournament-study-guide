version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: pool-db
    environment:
      POSTGRES_DB: pool_tournament
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ../
      dockerfile: deployment/Dockerfile
    container_name: pool-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/pool_tournament
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_FLYWAY_URL: jdbc:postgresql://db:5432/pool_tournament
      JWT_SECRET: your_very_secret_key_here_must_be_long_enough
      STRIPE_API_KEY: sk_test_placeholder
      TWILIO_ACCOUNT_SID: AC_placeholder
      TWILIO_AUTH_TOKEN: AT_placeholder
    depends_on:
      - db

volumes:
  postgres_data:
